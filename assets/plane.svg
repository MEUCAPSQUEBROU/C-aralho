<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 128" width="192" height="128">
  <!-- shadow under fuselage -->
  <ellipse cx="96" cy="68" rx="74" ry="12" fill="#000" opacity="0.18"/>

  <!-- horizontal stabilizers (small back wings) -->
  <polygon points="36,40 60,52 60,76 36,88" fill="#7d8a9a"/>
  <polygon points="36,40 60,52 60,76 36,88" fill="none" stroke="#3a424d" stroke-width="1.5"/>

  <!-- vertical fin (visible as small bump on top-down view) -->
  <polygon points="34,60 50,58 56,64 50,70 34,68" fill="#b22a2a"/>
  <polygon points="34,60 50,58 56,64 50,70 34,68" fill="none" stroke="#5a1010" stroke-width="1"/>

  <!-- main wings (swept) -->
  <polygon points="78,8 116,8 124,60 86,64" fill="#9aa6b6"/>
  <polygon points="78,120 116,120 124,68 86,64" fill="#9aa6b6"/>
  <polygon points="78,8 116,8 124,60 86,64" fill="none" stroke="#3a424d" stroke-width="1.5"/>
  <polygon points="78,120 116,120 124,68 86,64" fill="none" stroke="#3a424d" stroke-width="1.5"/>

  <!-- wing tip lights -->
  <circle cx="80" cy="12" r="3" fill="#ff3030"/>
  <circle cx="80" cy="116" r="3" fill="#30ff60"/>

  <!-- fuselage -->
  <ellipse cx="96" cy="64" rx="68" ry="11" fill="#dde4ee"/>
  <ellipse cx="96" cy="64" rx="68" ry="11" fill="none" stroke="#3a424d" stroke-width="1.5"/>

  <!-- red trim stripe on fuselage -->
  <rect x="32" y="62" width="128" height="4" fill="#c0303a"/>

  <!-- cockpit canopy -->
  <ellipse cx="128" cy="64" rx="14" ry="7" fill="#2c5d99"/>
  <ellipse cx="128" cy="62" rx="12" ry="4" fill="#7fb3e0" opacity="0.85"/>
  <ellipse cx="128" cy="64" rx="14" ry="7" fill="none" stroke="#1a3a60" stroke-width="1"/>

  <!-- nose cone -->
  <polygon points="158,58 168,64 158,70" fill="#3a424d"/>

  <!-- propeller spinner -->
  <circle cx="166" cy="64" r="3.5" fill="#1a1a1a"/>

  <!-- propeller blades (motion blur disc) -->
  <ellipse cx="170" cy="64" rx="2" ry="22" fill="#888" opacity="0.45"/>
  <ellipse cx="170" cy="64" rx="2" ry="22" fill="none" stroke="#444" stroke-width="0.6" opacity="0.55"/>
</svg>
